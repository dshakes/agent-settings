# Routine: doc-freshness — weekly drift check between code and docs; opens a docs PR.
# Opens into the normal loop. NEVER merges. Opt-in.
name: "routine · doc-freshness"

on:
  schedule:
    - cron: "0 7 * * 1"     # Mondays 07:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write           # docs-only branch
  pull-requests: write
  id-token: write

concurrency:
  group: routine-doc-freshness
  cancel-in-progress: false

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.SDLC_BOT_TOKEN || github.token }}
      - name: Find + fix doc drift
        uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.SDLC_BOT_TOKEN || github.token }}
          branch_prefix: "routine/doc-freshness-"
          prompt: |
            You are **Doc Freshness** (a scheduled maintenance agent). Compare the docs
            (README, docs/, command/flag help) against the code merged in the last ~2 weeks
            (`git log --since=...`). Where docs are STALE (renamed flags, removed commands,
            changed defaults, dead links), fix ONLY the documentation to match reality.
            Commit the doc edits and open a PR with a short "what drifted" summary. Do NOT
            change code, invent features, or merge. If docs are already accurate, do nothing.
          claude_args: |
            --model sonnet
            --max-turns 25
            --max-budget-usd 3.00
            --allowedTools "Read,Edit,Grep,Glob,Bash(git log:*),Bash(git diff:*),Bash(git add:*),Bash(git commit:*)"
