# Governance labels for the SDLC pipeline. Create them with: bash sdlc/setup.sh
# (or `make sdlc-setup`). Each label both documents state and triggers an agent.
#
# Trigger labels (a human or an agent applies them to drive the pipeline):
- name: "agent:plan"
  color: "8A63D2"
  description: "Planner: triage issue -> plan/ADR"
- name: "agent:build"
  color: "1f6feb"
  description: "Builder: implement on a branch, open a PR"
- name: "agent:review"
  color: "2ea44f"
  description: "Reviewer (Claude): correctness + convention review"
- name: "agent:audit"
  color: "d29922"
  description: "Auditor (Codex): independent cross-audit"
- name: "agent:security"
  color: "cf222e"
  description: "Security: secrets/authz/injection review"
- name: "agent:qa"
  color: "0969da"
  description: "QA: run tests, report failures"
- name: "agent:release"
  color: "6e7781"
  description: "Releaser: changelog/tag/deploy prep (human-gated)"
#
# Loop state (the Reviewer sets these; agent:needs-fix triggers the Builder fix-loop):
- name: "agent:needs-fix"
  color: "d93f0b"
  description: "Reviewer found Blocking issues -> triggers the auto-fix loop"
- name: "agent:reviewed-clean"
  color: "0e8a16"
  description: "Reviewer found no Blocking issues this round"
- name: "sdlc:fixing"
  color: "fbca04"
  description: "Builder is addressing review feedback on this PR"
- name: "sdlc:round-1"
  color: "ededed"
  description: "Auto-fix loop: round 1"
- name: "sdlc:round-2"
  color: "d4c5f9"
  description: "Auto-fix loop: round 2"
- name: "sdlc:round-3"
  color: "c5def5"
  description: "Auto-fix loop: round 3"
- name: "sdlc:needs-human"
  color: "b60205"
  description: "Auto-fix loop hit the round cap -> a human is needed"
- name: "sdlc:human-gate"
  color: "bf8700"
  description: "Awaiting human approval to merge/deploy"
- name: "sdlc:blocked"
  color: "b60205"
  description: "An agent found a blocker; needs attention"
#
# Work-type routing (the Classifier sets one; specialist reviewers gate on it):
- name: "domain:ui"
  color: "5319e7"
  description: "Touches UI / frontend — triggers design review"
- name: "domain:api"
  color: "1d76db"
  description: "Touches API / SDK / public contracts"
- name: "domain:infra"
  color: "0e8a16"
  description: "Touches infra / CI / deploy / migrations"
- name: "domain:docs"
  color: "c2e0c6"
  description: "Docs-only change"
- name: "domain:core"
  color: "bfdadc"
  description: "Core library / business logic"
