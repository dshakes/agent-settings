<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0d1117"/><stop offset="1" stop-color="#0a0e14"/></linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8A63D2"/><stop offset="0.5" stop-color="#58a6ff"/><stop offset="1" stop-color="#2ea44f"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-0.3 0;0.3 0;-0.3 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <marker id="a" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#8b949e"/></marker>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="1" y="1" width="1198" height="478" rx="20" fill="url(#bg)" stroke="#30363d" stroke-width="2"/>
  <rect x="1" y="476" width="1198" height="4" fill="url(#acc)"/>

  <!-- compass mark (seeking needle) + wordmark -->
  <g transform="translate(60,54)">
    <circle r="24" fill="#161b22" stroke="#8A63D2" stroke-width="2.5"/>
    <g>
      <polygon points="0,-15 5,0 0,3 -5,0" fill="#ff5f56"/><polygon points="0,15 5,0 0,-3 -5,0" fill="#c9d1d9"/>
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="9s" repeatCount="indefinite"/>
    </g>
    <circle r="2.5" fill="#0d1117" stroke="#c9d1d9" stroke-width="1"/>
    <text x="42" y="10" font-size="34" font-weight="800" fill="#f0f6fc">compass</text>
    <text x="44" y="34" font-size="15" fill="#8b949e">your best engineer, in every repo</text>
  </g>

  <!-- BEAT 1 — one config -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.5s" fill="freeze"/>
    <rect x="70" y="150" width="300" height="220" rx="16" fill="#161b22" stroke="#8A63D2" stroke-width="2"/>
    <text x="220" y="208" text-anchor="middle" font-size="30" font-weight="800" fill="#f0f6fc">one config</text>
    <text x="220" y="242" text-anchor="middle" font-size="16" fill="#adbac7">install once</text>
    <g transform="translate(180,268)">
      <rect width="80" height="62" rx="6" fill="#0d1117" stroke="#8A63D2" stroke-width="2"/>
      <line x1="14" y1="20" x2="14" y2="20" stroke="#8b949e" stroke-width="3" stroke-linecap="round"><animate attributeName="x2" values="14;66;66" keyTimes="0;0.5;1" dur="2.5s" begin="0.6s" repeatCount="indefinite"/></line>
      <line x1="14" y1="32" x2="14" y2="32" stroke="#8b949e" stroke-width="3" stroke-linecap="round"><animate attributeName="x2" values="14;66;66" keyTimes="0;0.6;1" dur="2.5s" begin="0.8s" repeatCount="indefinite"/></line>
      <line x1="14" y1="44" x2="14" y2="44" stroke="#6e7681" stroke-width="3" stroke-linecap="round"><animate attributeName="x2" values="14;48;48" keyTimes="0;0.7;1" dur="2.5s" begin="1s" repeatCount="indefinite"/></line>
    </g>
  </g>

  <!-- arrow 1 + flowing dots -->
  <line x1="378" y1="260" x2="432" y2="260" stroke="#8b949e" stroke-width="2.5" marker-end="url(#a)" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.4s" fill="freeze"/></line>
  <circle r="4" fill="#8A63D2" filter="url(#glow)"><animateMotion path="M378,260 L424,260" dur="1.3s" begin="1s" repeatCount="indefinite"/></circle>
  <circle r="3" fill="#58a6ff"><animateMotion path="M378,260 L424,260" dur="1.3s" begin="1.6s" repeatCount="indefinite"/></circle>

  <!-- BEAT 2 — every agent (chips light up in sequence) -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.5s" fill="freeze"/>
    <rect x="440" y="150" width="320" height="220" rx="16" fill="#161b22" stroke="#30363d" stroke-width="2"/>
    <text x="600" y="198" text-anchor="middle" font-size="28" font-weight="800" fill="#f0f6fc">every agent</text>
    <g font-size="16" text-anchor="middle" fill="#c9d1d9">
      <g><rect x="466" y="220" width="128" height="40" rx="9" fill="#0d1117" stroke="#8A63D2"><animate attributeName="stroke" values="#30363d;#8A63D2;#30363d" keyTimes="0;0.15;0.4" dur="4s" begin="1.6s" repeatCount="indefinite"/></rect><text x="530" y="246">Claude Code</text></g>
      <g><rect x="606" y="220" width="128" height="40" rx="9" fill="#0d1117" stroke="#30363d"><animate attributeName="stroke" values="#30363d;#58a6ff;#30363d" keyTimes="0;0.15;0.4" dur="4s" begin="2.0s" repeatCount="indefinite"/></rect><text x="670" y="246">Codex</text></g>
      <g><rect x="466" y="270" width="128" height="40" rx="9" fill="#0d1117" stroke="#30363d"><animate attributeName="stroke" values="#30363d;#2ea44f;#30363d" keyTimes="0;0.15;0.4" dur="4s" begin="2.4s" repeatCount="indefinite"/></rect><text x="530" y="296">Gemini</text></g>
      <g><rect x="606" y="270" width="128" height="40" rx="9" fill="#0d1117" stroke="#30363d"><animate attributeName="stroke" values="#30363d;#e3b341;#30363d" keyTimes="0;0.15;0.4" dur="4s" begin="2.8s" repeatCount="indefinite"/></rect><text x="670" y="296">Cursor</text></g>
    </g>
    <text x="600" y="344" text-anchor="middle" font-size="13" fill="#6e7681">one AGENTS.md · no drift</text>
  </g>

  <!-- arrow 2 + flowing dots -->
  <line x1="768" y1="260" x2="822" y2="260" stroke="#8b949e" stroke-width="2.5" marker-end="url(#a)" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.4s" fill="freeze"/></line>
  <circle r="4" fill="#2ea44f" filter="url(#glow)"><animateMotion path="M768,260 L814,260" dur="1.3s" begin="1.8s" repeatCount="indefinite"/></circle>

  <!-- BEAT 3 — autonomous PRs (rich loop: BLOCKING → CLEAN) -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.5s" fill="freeze"/>
    <rect x="830" y="150" width="300" height="220" rx="16" fill="#161b22" stroke="#2ea44f" stroke-width="2"/>
    <text x="980" y="198" text-anchor="middle" font-size="26" font-weight="800" fill="#f0f6fc">autonomous PRs</text>
    <g transform="translate(980,272)">
      <circle r="38" fill="none" stroke="#21262d" stroke-width="6"/>
      <!-- rotating progress arc -->
      <path d="M0,-38 A38,38 0 1 1 -38,0" fill="none" stroke="#8A63D2" stroke-width="6" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="2.6s" repeatCount="indefinite"/>
      </path>
      <!-- a token travelling the loop -->
      <circle r="5" fill="#58a6ff" filter="url(#glow)"><animateMotion path="M0,-38 A38,38 0 1 1 0,38 A38,38 0 1 1 0,-38" dur="2.6s" repeatCount="indefinite"/></circle>
      <!-- center status: BLOCKING (red) then CLEAN check (green) -->
      <circle r="13" fill="#cf222e"><animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.45;0.55;1" dur="3.6s" repeatCount="indefinite"/></circle>
      <text x="0" y="7" text-anchor="middle" font-size="22" font-weight="800" fill="#3fb950"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.55;0.65;1" dur="3.6s" repeatCount="indefinite"/>✓</text>
    </g>
    <text x="980" y="344" text-anchor="middle" font-size="14" fill="#adbac7">reviews · fixes itself · <tspan fill="#3fb950" font-weight="700">you merge</tspan></text>
  </g>

  <!-- benefit chips (rise + fade in) -->
  <g font-size="15" font-weight="600" text-anchor="middle">
    <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.6s" fill="freeze"/><animateTransform attributeName="transform" type="translate" values="0 8;0 0" begin="2.2s" dur="0.6s" fill="freeze"/>
      <text x="220" y="424" fill="#f85149">🛡 blocks the disaster</text></g>
    <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="2.5s" dur="0.6s" fill="freeze"/><animateTransform attributeName="transform" type="translate" values="0 8;0 0" begin="2.5s" dur="0.6s" fill="freeze"/>
      <text x="600" y="424" fill="#58a6ff">💰 cheaper by default</text></g>
    <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.6s" fill="freeze"/><animateTransform attributeName="transform" type="translate" values="0 8;0 0" begin="2.8s" dur="0.6s" fill="freeze"/>
      <text x="940" y="424" fill="#a371f7">⚡ ships faster</text></g>
  </g>
</svg>
