<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0d1117"/><stop offset="1" stop-color="#0a0e14"/></linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8A63D2"/><stop offset="0.5" stop-color="#58a6ff"/><stop offset="1" stop-color="#2ea44f"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-0.3 0;0.3 0;-0.3 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <marker id="a" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#8b949e"/></marker>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="1" y="1" width="1198" height="638" rx="20" fill="url(#bg)" stroke="#30363d" stroke-width="2"/>
  <rect x="1" y="636" width="1198" height="4" fill="url(#acc)"/>

  <!-- header: seeking compass needle + wordmark -->
  <g transform="translate(58,52)">
    <circle r="24" fill="#161b22" stroke="#8A63D2" stroke-width="2.5"/>
    <g><polygon points="0,-15 5,0 0,3 -5,0" fill="#ff5f56"/><polygon points="0,15 5,0 0,-3 -5,0" fill="#c9d1d9"/>
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="9s" repeatCount="indefinite"/></g>
    <circle r="2.5" fill="#0d1117" stroke="#c9d1d9" stroke-width="1"/>
    <text x="42" y="6" font-size="32" font-weight="800" fill="#f0f6fc">compass</text>
    <text x="44" y="30" font-size="15" fill="#8b949e">make Claude Code · Codex · Gemini your best engineer — every repo</text>
  </g>

  <!-- ============ ROW 1: the story (one config → every agent → autonomous PRs) ============ -->
  <!-- BEAT 1 -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.4s" dur="0.7s" fill="freeze"/>
    <rect x="64" y="120" width="296" height="190" rx="16" fill="#161b22" stroke="#8A63D2" stroke-width="2"/>
    <text x="212" y="176" text-anchor="middle" font-size="28" font-weight="800" fill="#f0f6fc">one config</text>
    <text x="212" y="206" text-anchor="middle" font-size="15" fill="#adbac7">install once · git-pull updates</text>
    <g transform="translate(172,228)">
      <rect width="80" height="58" rx="6" fill="#0d1117" stroke="#8A63D2" stroke-width="2"/>
      <line x1="14" y1="18" x2="14" y2="18" stroke="#8b949e" stroke-width="3" stroke-linecap="round"><animate attributeName="x2" values="14;66;66" keyTimes="0;0.5;1" dur="3s" begin="1.1s" repeatCount="indefinite"/></line>
      <line x1="14" y1="30" x2="14" y2="30" stroke="#8b949e" stroke-width="3" stroke-linecap="round"><animate attributeName="x2" values="14;66;66" keyTimes="0;0.6;1" dur="3s" begin="1.4s" repeatCount="indefinite"/></line>
      <line x1="14" y1="42" x2="14" y2="42" stroke="#6e7681" stroke-width="3" stroke-linecap="round"><animate attributeName="x2" values="14;46;46" keyTimes="0;0.7;1" dur="3s" begin="1.7s" repeatCount="indefinite"/></line>
    </g>
  </g>
  <line x1="368" y1="215" x2="426" y2="215" stroke="#8b949e" stroke-width="2.5" marker-end="url(#a)" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.5s" fill="freeze"/></line>
  <circle r="4" fill="#8A63D2" filter="url(#glow)"><animateMotion path="M368,215 L418,215" dur="1.5s" begin="1.5s" repeatCount="indefinite"/></circle>
  <circle r="3" fill="#58a6ff"><animateMotion path="M368,215 L418,215" dur="1.5s" begin="2.1s" repeatCount="indefinite"/></circle>

  <!-- BEAT 2 -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.3s" dur="0.7s" fill="freeze"/>
    <rect x="434" y="120" width="332" height="190" rx="16" fill="#161b22" stroke="#30363d" stroke-width="2"/>
    <text x="600" y="166" text-anchor="middle" font-size="26" font-weight="800" fill="#f0f6fc">every agent</text>
    <g font-size="15" text-anchor="middle" fill="#c9d1d9">
      <g><rect x="460" y="184" width="132" height="38" rx="9" fill="#0d1117" stroke="#8A63D2"><animate attributeName="stroke" values="#30363d;#8A63D2;#30363d" keyTimes="0;0.15;0.4" dur="4.5s" begin="2s" repeatCount="indefinite"/></rect><text x="526" y="209">Claude Code</text></g>
      <g><rect x="608" y="184" width="132" height="38" rx="9" fill="#0d1117" stroke="#30363d"><animate attributeName="stroke" values="#30363d;#58a6ff;#30363d" keyTimes="0;0.15;0.4" dur="4.5s" begin="2.4s" repeatCount="indefinite"/></rect><text x="674" y="209">Codex</text></g>
      <g><rect x="460" y="230" width="132" height="38" rx="9" fill="#0d1117" stroke="#30363d"><animate attributeName="stroke" values="#30363d;#2ea44f;#30363d" keyTimes="0;0.15;0.4" dur="4.5s" begin="2.8s" repeatCount="indefinite"/></rect><text x="526" y="255">Gemini</text></g>
      <g><rect x="608" y="230" width="132" height="38" rx="9" fill="#0d1117" stroke="#30363d"><animate attributeName="stroke" values="#30363d;#e3b341;#30363d" keyTimes="0;0.15;0.4" dur="4.5s" begin="3.2s" repeatCount="indefinite"/></rect><text x="674" y="255">Cursor</text></g>
    </g>
    <text x="600" y="295" text-anchor="middle" font-size="13" fill="#6e7681">one AGENTS.md · no drift</text>
  </g>
  <line x1="774" y1="215" x2="832" y2="215" stroke="#8b949e" stroke-width="2.5" marker-end="url(#a)" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="2s" dur="0.5s" fill="freeze"/></line>
  <circle r="4" fill="#2ea44f" filter="url(#glow)"><animateMotion path="M774,215 L824,215" dur="1.5s" begin="2.4s" repeatCount="indefinite"/></circle>

  <!-- BEAT 3 -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.7s" fill="freeze"/>
    <rect x="840" y="120" width="296" height="190" rx="16" fill="#161b22" stroke="#2ea44f" stroke-width="2"/>
    <text x="988" y="166" text-anchor="middle" font-size="24" font-weight="800" fill="#f0f6fc">autonomous PRs</text>
    <g transform="translate(988,228)">
      <circle r="34" fill="none" stroke="#21262d" stroke-width="6"/>
      <path d="M0,-34 A34,34 0 1 1 -34,0" fill="none" stroke="#8A63D2" stroke-width="6" stroke-linecap="round"><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="2.8s" repeatCount="indefinite"/></path>
      <circle r="5" fill="#58a6ff" filter="url(#glow)"><animateMotion path="M0,-34 A34,34 0 1 1 0,34 A34,34 0 1 1 0,-34" dur="2.8s" repeatCount="indefinite"/></circle>
      <circle r="12" fill="#cf222e"><animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.45;0.55;1" dur="3.8s" repeatCount="indefinite"/></circle>
      <text x="0" y="7" text-anchor="middle" font-size="20" font-weight="800" fill="#3fb950"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.55;0.65;1" dur="3.8s" repeatCount="indefinite"/>✓</text>
    </g>
    <text x="988" y="295" text-anchor="middle" font-size="13.5" fill="#adbac7">reviews · fixes itself · <tspan fill="#3fb950" font-weight="700">you merge</tspan></text>
  </g>

  <!-- ============ ROW 2: under the hood (depict the rest — icon + short label, no clutter) ============ -->
  <text x="600" y="370" text-anchor="middle" font-size="13" font-weight="700" fill="#6e7681" letter-spacing="3">UNDER THE HOOD · ALL OPT-IN</text>
  <g font-size="16" font-weight="600" text-anchor="middle">
    <!-- row A: 4 chips -->
    <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.6s" fill="freeze"/>
      <rect x="42"  y="388" width="270" height="48" rx="12" fill="#13181f" stroke="#cf222e" stroke-width="1.3"/><text x="177" y="418" fill="#f85149">🛡  guardrails</text></g>
    <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="3.2s" dur="0.6s" fill="freeze"/>
      <rect x="324" y="388" width="270" height="48" rx="12" fill="#13181f" stroke="#2ea44f" stroke-width="1.3"/><text x="459" y="418" fill="#3fb950">💰  cost-tiered · local/router</text></g>
    <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="3.4s" dur="0.6s" fill="freeze"/>
      <rect x="606" y="388" width="270" height="48" rx="12" fill="#13181f" stroke="#8A63D2" stroke-width="1.3"/><text x="741" y="418" fill="#a371f7">🧩  subagents · cmds · MCP</text></g>
    <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="3.6s" dur="0.6s" fill="freeze"/>
      <rect x="888" y="388" width="270" height="48" rx="12" fill="#13181f" stroke="#e3b341" stroke-width="1.3"/><text x="1023" y="418" fill="#e3b341">⏰  scheduled agents</text></g>
    <!-- row B: 3 chips, centered -->
    <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="3.85s" dur="0.6s" fill="freeze"/>
      <rect x="183" y="448" width="270" height="48" rx="12" fill="#13181f" stroke="#58a6ff" stroke-width="1.3"/><text x="318" y="478" fill="#58a6ff">📋  spec-driven</text></g>
    <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="4.05s" dur="0.6s" fill="freeze"/>
      <rect x="465" y="448" width="270" height="48" rx="12" fill="#13181f" stroke="#a371f7" stroke-width="1.3"/><text x="600" y="478" fill="#a371f7">🔁  cross-model audit</text></g>
    <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="4.25s" dur="0.6s" fill="freeze"/>
      <rect x="747" y="448" width="270" height="48" rx="12" fill="#13181f" stroke="#2ea44f" stroke-width="1.6"/><text x="882" y="478" fill="#3fb950">🔒  human merge gate</text></g>
  </g>

  <!-- footer tagline -->
  <text x="600" y="556" text-anchor="middle" font-size="16" fill="#adbac7">install once · works everywhere · stops footguns · cuts cost · ships faster — <tspan fill="#8A63D2" font-weight="700">no magic, all open</tspan>
    <animate attributeName="opacity" from="0" to="1" begin="4.8s" dur="0.8s" fill="freeze"/>
  </text>
  <text x="600" y="596" text-anchor="middle" font-size="13" fill="#6e7681">MIT · github.com/dshakes/compass</text>
</svg>
