<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0d1117"/><stop offset="1" stop-color="#0a0e14"/></linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8A63D2"/><stop offset="1" stop-color="#2ea44f"/></linearGradient>
    <marker id="a" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#8b949e"/></marker>
  </defs>
  <rect x="1" y="1" width="1198" height="478" rx="20" fill="url(#bg)" stroke="#30363d" stroke-width="2"/>
  <rect x="1" y="476" width="1198" height="4" fill="url(#acc)"/>

  <!-- compass mark + wordmark -->
  <g transform="translate(60,54)">
    <circle r="24" fill="#161b22" stroke="#8A63D2" stroke-width="2.5"/>
    <polygon points="0,-15 5,0 0,3 -5,0" fill="#ff5f56"/><polygon points="0,15 5,0 0,-3 -5,0" fill="#c9d1d9"/>
    <text x="42" y="10" font-size="34" font-weight="800" fill="#f0f6fc">compass</text>
    <text x="44" y="34" font-size="15" fill="#8b949e">your best engineer, in every repo</text>
  </g>

  <!-- THREE BIG BEATS (minimal words, animated reveal) -->
  <!-- beat 1: one config -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.5s" fill="freeze"/>
    <rect x="70" y="150" width="300" height="220" rx="16" fill="#161b22" stroke="#8A63D2" stroke-width="2"/>
    <text x="220" y="210" text-anchor="middle" font-size="30" font-weight="800" fill="#f0f6fc">one config</text>
    <text x="220" y="245" text-anchor="middle" font-size="16" fill="#adbac7">install once</text>
    <!-- file glyph -->
    <g transform="translate(180,270)">
      <rect width="80" height="60" rx="6" fill="#0d1117" stroke="#8A63D2" stroke-width="2"/>
      <line x1="14" y1="20" x2="66" y2="20" stroke="#6e7681" stroke-width="3"/>
      <line x1="14" y1="32" x2="66" y2="32" stroke="#6e7681" stroke-width="3"/>
      <line x1="14" y1="44" x2="48" y2="44" stroke="#6e7681" stroke-width="3"/>
    </g>
  </g>
  <line x1="378" y1="260" x2="430" y2="260" stroke="#8b949e" stroke-width="2.5" marker-end="url(#a)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.4s" fill="freeze"/>
  </line>

  <!-- beat 2: every agent -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.5s" fill="freeze"/>
    <rect x="440" y="150" width="320" height="220" rx="16" fill="#161b22" stroke="#30363d" stroke-width="2"/>
    <text x="600" y="200" text-anchor="middle" font-size="28" font-weight="800" fill="#f0f6fc">every agent</text>
    <g font-size="16" text-anchor="middle" fill="#c9d1d9">
      <rect x="466" y="222" width="128" height="40" rx="9" fill="#0d1117" stroke="#30363d"/><text x="530" y="248">Claude Code</text>
      <rect x="606" y="222" width="128" height="40" rx="9" fill="#0d1117" stroke="#30363d"/><text x="670" y="248">Codex</text>
      <rect x="466" y="272" width="128" height="40" rx="9" fill="#0d1117" stroke="#30363d"/><text x="530" y="298">Gemini</text>
      <rect x="606" y="272" width="128" height="40" rx="9" fill="#0d1117" stroke="#30363d"/><text x="670" y="298">Cursor</text>
    </g>
    <text x="600" y="344" text-anchor="middle" font-size="13" fill="#6e7681">one AGENTS.md · no drift</text>
  </g>
  <line x1="768" y1="260" x2="820" y2="260" stroke="#8b949e" stroke-width="2.5" marker-end="url(#a)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.4s" fill="freeze"/>
  </line>

  <!-- beat 3: autonomous PRs -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.5s" fill="freeze"/>
    <rect x="830" y="150" width="300" height="220" rx="16" fill="#161b22" stroke="#2ea44f" stroke-width="2"/>
    <text x="980" y="200" text-anchor="middle" font-size="26" font-weight="800" fill="#f0f6fc">autonomous PRs</text>
    <!-- circular loop arrow -->
    <g transform="translate(980,270)">
      <path d="M0,-34 A34,34 0 1 1 -34,0" fill="none" stroke="#8A63D2" stroke-width="5" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" begin="2.1s" repeatCount="indefinite"/>
      </path>
      <polygon points="-34,-8 -42,4 -26,4" fill="#8A63D2">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" begin="2.1s" repeatCount="indefinite"/>
      </polygon>
      <text x="0" y="6" text-anchor="middle" font-size="22" font-weight="800" fill="#3fb950">✓</text>
    </g>
    <text x="980" y="344" text-anchor="middle" font-size="14" fill="#adbac7">reviews · fixes itself · <tspan fill="#3fb950" font-weight="700">you merge</tspan></text>
  </g>

  <!-- benefit chips (reveal last) -->
  <g opacity="0" font-size="15" font-weight="600" text-anchor="middle">
    <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.6s" fill="freeze"/>
    <text x="240" y="424" fill="#f85149">🛡 blocks the disaster</text>
    <text x="600" y="424" fill="#58a6ff">💰 cheaper by default</text>
    <text x="940" y="424" fill="#a371f7">⚡ ships faster</text>
  </g>
</svg>
