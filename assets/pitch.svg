<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 720" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/><stop offset="1" stop-color="#0a0e14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8A63D2"/><stop offset="1" stop-color="#2ea44f"/>
    </linearGradient>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#8b949e"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="1238" height="718" rx="18" fill="url(#bg)" stroke="#30363d" stroke-width="2"/>
  <rect x="1" y="716" width="1238" height="3" fill="url(#accent)"/>

  <!-- header -->
  <g transform="translate(40,40)">
    <circle cx="20" cy="14" r="18" fill="#161b22" stroke="#8A63D2" stroke-width="2"/>
    <polygon points="20,2 25,14 20,17 15,14" fill="#ff5f56"/>
    <polygon points="20,26 25,14 20,11 15,14" fill="#c9d1d9"/>
    <text x="48" y="22" font-size="30" font-weight="700" fill="#f0f6fc">compass</text>
    <text x="190" y="22" font-size="17" fill="#8b949e">your best engineer, in every repo — for Claude Code &amp; Codex</text>
  </g>

  <!-- ROW 1 — problem → one config → every agent -->
  <g transform="translate(40,96)">
    <text x="0" y="0" font-size="13" font-weight="700" fill="#6e7681" letter-spacing="1">THE PROBLEM → THE FIX</text>

    <!-- problem -->
    <g transform="translate(0,18)">
      <rect width="300" height="150" rx="12" fill="#13181f" stroke="#30363d"/>
      <text x="20" y="34" font-size="15" font-weight="600" fill="#adbac7">Every repo, rebuilt by hand:</text>
      <g font-size="13" fill="#6e7681">
        <text x="20" y="62">· CLAUDE.md? AGENTS.md?</text>
        <text x="20" y="84">· hooks · rules · MCP · models</text>
        <text x="20" y="106">· different per tool, per repo</text>
      </g>
      <text x="20" y="134" font-size="13" fill="#e3b341">inconsistent · risky · pricey</text>
    </g>

    <line x1="312" y1="93" x2="356" y2="93" stroke="#8b949e" stroke-width="2" marker-end="url(#ar)"/>

    <!-- one config -->
    <g transform="translate(366,18)">
      <rect width="220" height="150" rx="12" fill="#161b22" stroke="#8A63D2" stroke-width="2"/>
      <text x="110" y="60" text-anchor="middle" font-size="20" font-weight="700" fill="#f0f6fc">one config</text>
      <text x="110" y="86" text-anchor="middle" font-size="14" fill="#adbac7">CLAUDE.md ≙ AGENTS.md</text>
      <text x="110" y="112" text-anchor="middle" font-size="13" fill="#8b949e">install once · git-pull updates</text>
      <text x="110" y="134" text-anchor="middle" font-size="12" fill="#3fb950">one source, no drift</text>
    </g>

    <line x1="598" y1="93" x2="642" y2="93" stroke="#8b949e" stroke-width="2" marker-end="url(#ar)"/>

    <!-- every agent -->
    <g transform="translate(652,18)" font-size="14" fill="#c9d1d9" text-anchor="middle">
      <rect width="492" height="150" rx="12" fill="#13181f" stroke="#2ea44f" stroke-width="1.5"/>
      <text x="246" y="30" font-size="13" font-weight="700" fill="#3fb950">EVERY AGENT</text>
      <g>
        <rect x="24"  y="48" width="140" height="38" rx="9" fill="#161b22" stroke="#30363d"/><text x="94"  y="72">Claude Code</text>
        <rect x="176" y="48" width="140" height="38" rx="9" fill="#161b22" stroke="#30363d"/><text x="246" y="72">Codex</text>
        <rect x="328" y="48" width="140" height="38" rx="9" fill="#161b22" stroke="#30363d"/><text x="398" y="72">Gemini CLI</text>
        <rect x="24"  y="96" width="216" height="38" rx="9" fill="#161b22" stroke="#30363d"/><text x="132" y="120" font-size="13">Cursor · Windsurf · Copilot</text>
        <rect x="252" y="96" width="216" height="38" rx="9" fill="#161b22" stroke="#30363d"/><text x="360" y="120" font-size="12" fill="#8b949e">AGENTS.md open standard</text>
      </g>
    </g>
  </g>

  <!-- ROW 2 — defaults that pay off -->
  <g transform="translate(40,296)">
    <text x="0" y="0" font-size="13" font-weight="700" fill="#6e7681" letter-spacing="1">SENIOR-ENGINEER DEFAULTS, ON BY DEFAULT</text>
    <g transform="translate(0,16)" font-size="14">
      <rect width="360" height="76" rx="12" fill="#13181f" stroke="#cf222e" stroke-width="1.3"/>
      <text x="22" y="32" font-size="15" font-weight="700" fill="#f85149">🛡 stops the disaster</text>
      <text x="22" y="56" fill="#8b949e" font-size="13">blocks rm -rf / · secret writes · force-push to main</text>

      <rect x="380" width="360" height="76" rx="12" fill="#13181f" stroke="#1f6feb" stroke-width="1.3"/>
      <text x="402" y="32" font-size="15" font-weight="700" fill="#58a6ff">✨ cleans up + costs less</text>
      <text x="402" y="56" fill="#8b949e" font-size="13">auto-formats edits · cheap models do grunt work · live $</text>

      <rect x="760" width="384" height="76" rx="12" fill="#13181f" stroke="#8A63D2" stroke-width="1.3"/>
      <text x="782" y="32" font-size="15" font-weight="700" fill="#a371f7">🧠 brings a crew</text>
      <text x="782" y="56" fill="#8b949e" font-size="13">9 specialist subagents · /ship /review /tdd /spec …</text>
    </g>
  </g>

  <!-- ROW 3 — the autonomous loop (the star) -->
  <g transform="translate(40,418)">
    <text x="0" y="0" font-size="13" font-weight="700" fill="#6e7681" letter-spacing="1">RAISE A PR → IT REVIEWS &amp; FIXES ITSELF → YOU MERGE</text>
    <rect y="16" width="1144" height="210" rx="14" fill="#10151c" stroke="#30363d"/>

    <g font-size="14" text-anchor="middle">
      <rect x="40"  y="70" width="150" height="50" rx="10" fill="#161b22" stroke="#30363d"/><text x="115" y="100" fill="#c9d1d9">you open a PR</text>
      <line x1="194" y1="95" x2="234" y2="95" stroke="#8b949e" stroke-width="2" marker-end="url(#ar)"/>

      <rect x="238" y="62" width="250" height="66" rx="10" fill="#161b22" stroke="#30363d"/>
      <text x="363" y="88" fill="#c9d1d9" font-size="13">review · security · tests</text>
      <text x="363" y="108" fill="#8b949e" font-size="12">+ Codex cross-audit (2nd opinion)</text>
      <line x1="492" y1="95" x2="532" y2="95" stroke="#8b949e" stroke-width="2" marker-end="url(#ar)"/>

      <rect x="536" y="62" width="226" height="66" rx="10" fill="#161b22" stroke="#d29922"/>
      <text x="649" y="88" fill="#e3b341" font-size="13">Blocking? Builder fixes</text>
      <text x="649" y="108" fill="#8b949e" font-size="12">on the branch ↻ re-review</text>
      <line x1="766" y1="95" x2="806" y2="95" stroke="#8b949e" stroke-width="2" marker-end="url(#ar)"/>

      <rect x="810" y="62" width="250" height="66" rx="10" fill="#161b22" stroke="#2ea44f"/>
      <text x="935" y="90" fill="#3fb950" font-weight="700">green → you merge</text>
      <!-- animated check -->
      <text x="935" y="114" font-size="18" fill="#3fb950">✓
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.45;0.6;0.92;1" dur="4s" repeatCount="indefinite"/>
      </text>

      <!-- loop-back (pulsing) -->
      <path d="M649 128 L649 158 L115 158 L115 122" fill="none" stroke="#6e7681" stroke-width="1.6" stroke-dasharray="5 5" marker-end="url(#ar)">
        <animate attributeName="opacity" values="0.25;1;0.25" dur="2.2s" repeatCount="indefinite"/>
      </path>
      <text x="382" y="153" font-size="11" fill="#6e7681">repeats until clean (round-capped) — no human in this lap</text>
    </g>

    <text x="1124" y="40" text-anchor="end" font-size="13" fill="#3fb950" font-weight="700">humans own merge &amp; deploy — always</text>
  </g>

  <!-- footer -->
  <text x="620" y="688" text-anchor="middle" font-size="15" fill="#adbac7">install once · works everywhere · stops footguns · cuts cost · ships faster — <tspan fill="#8A63D2" font-weight="700">no magic, all open</tspan></text>
  <text x="620" y="708" text-anchor="middle" font-size="12" fill="#6e7681">MIT · github.com/dshakes/compass</text>
</svg>
