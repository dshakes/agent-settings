name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install tooling
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq shellcheck

      - name: doctor (JSON, frontmatter, plugin sync, executability)
        run: make doctor

      - name: shellcheck (errors fail the build)
        run: shellcheck -S error claude/hooks/*.sh claude/hooks/lib/*.sh claude/statusline.sh scripts/*.sh install.sh claude/skills/*/*.sh sdlc/*.sh

      - name: shellcheck (style — informational)
        run: shellcheck -S style claude/hooks/*.sh scripts/*.sh install.sh || true

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Lint workflows + SDLC templates (actionlint + embedded shellcheck)
        env:
          SHELLCHECK_OPTS: --severity=error   # match the repo's error-level gate
        run: |
          "$(go env GOPATH)/bin/actionlint" \
            .github/workflows/*.yml sdlc/workflows/*.yml sdlc/selfhosted/*.yml

      - name: SDLC loop self-test (round cap + verdict parsing)
        run: bash sdlc/selftest.sh

      - name: compass-memory store tests (redaction + trust tiers)
        run: python3 mcp/compass-memory/test_store.py

      - name: Plugin is in sync with claude/ source
        run: ./scripts/sync-plugin.sh --check
